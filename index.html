<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÓDIGO ALFA VIP</title>

<!-- Tipografía -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
/* ========== RESET ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========== BASE ========== */
body {
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
  overflow-x: hidden;
}

/* Glow radial fondo */
body::before {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(90px);
  z-index: 0;
}

/* ========== HEADER ========== */
header {
  text-align: center;
  font-size: 0.75rem;
  color: #555;
  letter-spacing: 2px;
  margin-bottom: 2rem;
  z-index: 1;
}

/* ========== HERO TITLE (ORO 24K) ========== */
h1 {
  font-size: 2.5rem;
  font-weight: 800;
  text-align: center;
  background: linear-gradient(90deg, #D4AF37, #FBF5E6, #C5A028);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 
    0 0 10px rgba(212,175,55,0.4),
    0 0 20px rgba(212,175,55,0.2);
  letter-spacing: 2px;
  margin-bottom: 1.5rem;
  z-index: 1;
}

/* ========== EBOOK SECTION ========== */
.ebook-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  max-width: 600px;
  gap: 1.5rem;
  z-index: 1;
}

/* Portada placeholder */
.ebook-cover {
  width: 180px;
  height: 260px;
  border: 1px solid rgba(212,175,55,0.4);
  border-radius: 8px;
  background: linear-gradient(145deg, #0a0a0a, #111);
  box-shadow: 0 0 20px rgba(212,175,55,0.1);
}

/* Texto */
.ebook-text {
  font-size: 0.95rem;
  color: #bbb;
  max-width: 400px;
}

/* ========== VAULT FORM ========== */
.vault {
  margin-top: 2rem;
  padding: 2rem;
  width: 100%;
  max-width: 400px;
  background: #0A0A0A;
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 16px;
  position: relative;
  z-index: 1;
}

/* Glow detrás */
.vault::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(212,175,55,0.2), transparent 70%);
  top: -50px;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(60px);
  z-index: -1;
}

/* Formulario */
form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(212,175,55,0.4);
  padding: 0.7rem 0;
  color: #fff;
  font-size: 0.9rem;
}

input::placeholder {
  color: #666;
  letter-spacing: 1px;
}

input:focus {
  outline: none;
  border-bottom: 1px solid #D4AF37;
}

/* BOTÓN CTA */
button {
  margin-top: 1rem;
  padding: 0.9rem;
  background: #D4AF37;
  border: none;
  color: #000;
  font-weight: 800;
  letter-spacing: 1px;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background: #f5d777;
  box-shadow: 0 0 25px rgba(212,175,55,0.8);
}

/* ========== RESPONSIVE ========== */
@media(min-width: 768px) {

  h1 {
    font-size: 4rem;
  }

  .ebook-section {
    flex-direction: row;
    text-align: left;
    gap: 3rem;
  }

  .ebook-text {
    font-size: 1rem;
  }

}
</style>
</head>

<body>

<header>ACCESO EXCLUSIVO AL 1%</header>

<h1>CÓDIGO ALFA VIP</h1>

<section class="ebook-section">
  <div class="ebook-cover"></div>
  <p class="ebook-text">
    Domina tu mente. Domina tu entorno. Descarga la guía operativa para el hombre de alto rendimiento.
  </p>
</section>

<div class="vault">
  <form>
    <input type="text" placeholder="NOMBRE" required>
    <input type="email" placeholder="EMAIL PRIVADO" required>
    <button type="submit">DESCARGAR GUÍA AHORA</button>
  </form>
</div>

</body>
</html>
