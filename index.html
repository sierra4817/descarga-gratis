<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Alfa - La Estructura del 1%</title>
    <style>
        /* Estilos Premium - Negro y Dorado */
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-align: center; padding: 50px 20px; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 450px; width: 100%; border: 1px solid #d4af37; padding: 40px; border-radius: 20px; background: #1a1a1a; box-shadow: 0 15px 35px rgba(0,0,0,0.7); box-sizing: border-box; }
        h1 { color: #d4af37; letter-spacing: 3px; font-size: 26px; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
        p { color: #aaaaaa; line-height: 1.7; font-size: 16px; margin-bottom: 25px; }
        
        /* Estilos del Formulario */
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #d4af37; outline: none; }
        
        /* Botón de Acción */
        button { background-color: #d4af37; color: #000; padding: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; font-size: 16px; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background-color: #ffffff; transform: translateY(-2px); }
        
        /* Pie de página */
        .footer { font-size: 12px; color: #666; margin-top: 30px; letter-spacing: 1px; }
        .secure-icon { color: #d4af37; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DOMINA TU CAMINO</h1>
        <p>Estás a un paso de acceder a <strong>La Estructura del 1%</strong>. Deja tu correo para recibir el libro digital gratuito y unirte a la élite.</p>
        
        <form action="#" method="POST">
            <input type="text" name="name" placeholder="Tu nombre" required>
            <input type="email" name="email" placeholder="Tu correo electrónico" required>
            <button type="submit">OBTENER ACCESO INMEDIATO</button>
        </form>
        
        <div class="footer"><span class="secure-icon">🔒</span>Privacidad 100% garantizada. Sin spam.</div>
    </div>
</body>
</html>
