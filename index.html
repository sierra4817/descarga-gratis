<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CÓDIGO ALFA VIP — Acceso Directo</title>
  
  <style>
    :root {
      --bg: #05050A;
      --gold: #C9A227;
      --text: #EEF0F6;
      --muted: #A6AEC0;
      --card: #0E1016;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; flex: 1; }

    /* Cabecera con Logo */
    header { text-align: center; margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .logo-img { max-width: 100px; height: auto; border-radius: 50%; border: 2px solid var(--gold); padding: 5px; background: rgba(255,255,255,0.02); }
    .logo-text { font-weight: 900; letter-spacing: 2px; color: var(--gold); font-size: 22px; text-transform: uppercase; }

    /* Sección Principal */
    .hero { text-align: center; margin-bottom: 50px; }
    h1 { font-size: 42px; margin-bottom: 15px; line-height: 1.1; letter-spacing: -1px; }
    h1 span { color: var(--gold); }
    .subtitle { color: var(--muted); font-size: 19px; margin-bottom: 30px; }

    /* Caja de descarga */
    .download-box {
      background: var(--card);
      border: 1px solid rgba(201, 162, 39, 0.3);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    /* Vista previa de la Guía */
    .guide-preview {
      background: linear-gradient(135deg, #1a1c24 0%, #05050a 100%);
      height: 300px;
      border-radius: 12px;
      border: 1px solid var(--gold);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(201,162,39,0.1);
    }
    .guide-logo-inner { max-width: 80px; margin-bottom: 20px; border-radius: 50%; }

    /* Formulario */
    form { display: grid; gap: 15px; }
    input {
      padding: 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 16px;
      width: 100%;
    }
    input:focus { border-color: var(--gold); outline: none; background: rgba(255,255,255,0.08); }

    .btn {
      background: var(--gold);
      color: black;
      padding: 18px;
      border-radius: 10px;
      border: none;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(201, 162, 39, 0.4); }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
      color: var(--muted);
    }
    .contact-email { color: var(--gold); font-weight: bold; margin-top: 10px; display: block; text-decoration: none; }

    /* Responsive */
    @media (max-width: 750px) {
      .download-box { grid-template-columns: 1fr; padding: 25px; gap: 30px; }
      h1 { font-size: 32px; }
      .guide-preview { height: 220px; }
      .logo-img { max-width: 70px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <img src="https://i.postimg.cc/mD8mK0z6/image.png" alt="Logo Código Alfa" class="logo-img">
      <div class="logo-text">CÓDIGO ALFA VIP</div>
    </header>

    <main>
      <div class="hero">
        <h1>Acceso exclusivo a<br><span>CÓDIGO ALFA VIP</span></h1>
        <p class="subtitle">Descarga la arquitectura de disciplina inquebrantable para el 1%.</p>
      </div>

      <div class="download-box">
        <div class="guide-preview">
          <img src="https://i.postimg.cc/mD8mK0z6/image.png" alt="Código Alfa VIP" class="guide-logo-inner">
          <div style="font-weight: 900; letter-spacing: 1px; color: var(--gold); font-size: 18px;">GUÍA TÁCTICA VIP</div>
          <div style="font-size: 11px; opacity: 0.6; margin-top: 5px; text-transform: uppercase;">Contenido de Alto Valor</div>
        </div>

        <div class="form-container">
          <form action="#" method="POST">
            <input type="text" name="name" placeholder="Tu nombre" required>
            <input type="email" name="email" placeholder="Tu mejor email" required>
            <button type="submit" class="btn">Obtener Guía VIP Gratis</button>
            <p style="font-size: 12px; color: var(--muted); text-align: center; margin-top: 12px;">
              🛡️ Envío inmediato y seguro.
            </p>
          </form>
        </div>
      </div>
    </main>
  </div>

  <footer>
    <p>© <span id="year"></span> Albert Sierra · CÓDIGO ALFA</p>
    <p>Soporte y contacto:</p>
    <a href="mailto:codigo.alfa2.3@gmail.com" class="contact-email">codigo.alfa2.3@gmail.com</a>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
