<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Alfa VIP</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #111);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(10px);
    padding: 45px;
    border-radius: 14px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.05);
}

.badge {
    font-size: 11px;
    letter-spacing: 1px;
    color: #f5c542;
    margin-bottom: 10px;
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.sub {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 25px;
    line-height: 1.4;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    background: #1a1a1a;
    color: #fff;
}

button {
    width: 100%;
    padding: 15px;
    background: #f5c542;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.25s ease;
}

button:hover {
    background: #d4a82f;
    transform: translateY(-2px);
}

.social-proof {
    font-size: 12px;
    color: #777;
    margin-top: 15px;
}

.urgency {
    font-size: 12px;
    color: #ff4d4d;
    margin-top: 10px;
}

.success {
    display: none;
    color: #00ffae;
    margin-top: 15px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="badge">ACCESO RESTRINGIDO</div>

    <h1>Código Alfa VIP</h1>

    <div class="sub">
        No es contenido público. Es información diseñada para quienes quieren posicionarse por delante del 99%.
    </div>

    <form id="form">
        <input type="email" name="email" placeholder="Tu mejor email" required>
        <button type="submit" id="btn">SOLICITAR ACCESO</button>
    </form>

    <div class="success" id="success">
        Acceso solicitado. Revisa tu email.
    </div>

    <div class="urgency">
        Solo 37 accesos disponibles hoy
    </div>

    <div class="social-proof">
        +1,284 ya dentro
    </div>

</div>

<script>
const form = document.getElementById('form');
const btn = document.getElementById('btn');
const success = document.getElementById('success');

form.addEventListener('submit', function(e){
    e.preventDefault();

    btn.innerText = "Procesando...";
    btn.disabled = true;

    setTimeout(() => {
        success.style.display = "block";
        btn.innerText = "Acceso solicitado";
    }, 1200);
});
</script>

</body>
</html>
