<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CÓDIGO ALFA VIP | El 1% No Compite, Lidera</title>
    <style>
        :root {
            --bg: #050505;
            --gold: #AD935B; /* Oro Envejecido */
            --gold-bright: #D4AF37;
            --text: #F2F2F2;
            --muted: #666666;
            --card: #0D0D0D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Navegación y Logo */
        header { padding: 40px 0; text-align: center; }
        .logo { width: 100px; height: auto; border: 1px solid var(--gold); padding: 5px; margin-bottom: 10px; }
        .brand-name { 
            font-size: 14px; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            color: var(--gold); 
            font-weight: 300;
        }

        /* Hero Section */
        .hero { display: flex; align-items: center; justify-content: space-between; padding: 60px 0; gap: 40px; }
        .hero-content { flex: 1; }
        .hero-content h1 { 
            font-size: clamp(48px, 8vw, 72px); 
            line-height: 0.9; 
            margin-bottom: 25px; 
            letter-spacing: -3px;
        }
        .hero-content p { 
            font-size: 20px; 
            color: var(--muted); 
            max-width: 480px; 
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* Tarjeta de Conversión (The Vault) */
        .vault-card { 
            background: var(--card); 
            border: 1px solid #1A1A1A; 
            padding: 50px; 
            flex: 0 0 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 4px solid var(--gold);
        }
        .vault-card h2 { font-size: 24px; margin-bottom: 30px; letter-spacing: -1px; text-transform: uppercase; }

        /* Formulario Estilo Premium */
        .form-group { margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 15px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--gold); outline: none; }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: var(--gold);
            color: black;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .btn-submit:hover { background: var(--gold-bright); transform: translateY(-2px); }

        /* Imagen de Producto */
        .product-preview { width: 100%; max-width: 320px; margin-top: 20px; opacity: 0.8; }

        footer { 
            text-align: center; 
            padding: 80px 0 40px; 
            font-size: 11px; 
            color: #333; 
            letter-spacing: 2px;
            border-top: 1px solid #111;
            margin-top: 50px;
        }
        .email-link { color: #555; text-decoration: none; font-weight: bold; }

        /* Mobile */
        @media (max-width: 850px) {
            .hero { flex-direction: column; text-align: center; }
            .vault-card { flex: 1; width: 100%; padding: 30px; }
            .hero-content h1 { font-size: 52px; }
            .hero-content p { margin: 0 auto 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="https://i.postimg.cc/mD8mK0z6/image.png" alt="CÓDIGO ALFA LOGO" class="logo">
            <p class="brand-name">Albert Sierra · VIP</p>
        </header>

        <main class="hero">
            <section class="hero-content">
                <h1>CÓDIGO<br>ALFA VIP</h1>
                <p>Descarga la arquitectura operativa de disciplina y dominio mental diseñada para el 1%.</p>
                <img src="https://i.postimg.cc/qR8XFzD0/image.png" alt="Guía Táctica VIP" class="product-preview">
            </section>

            <section class="vault-card">
                <h2>RECLAMAR ACCESO</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <input type="text" placeholder="NOMBRE" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="EMAIL PRIVADO" required>
                    </div>
                    <button type="submit" class="btn-submit">Obtener Guía Ahora</button>
                </form>
                <p style="font-size: 10px; color: #333; margin-top: 25px; text-align: center; letter-spacing: 1px;">
                    ACCESO ENCRIPTADO · SIN SPAM
                </p>
            </section>
        </main>

        <footer>
            <p>© <span id="year"></span> CÓDIGO ALFA · LA PSICOLOGÍA DEL 1%</p>
            <a href="mailto:codigo.alfa2.3@gmail.com" class="email-link">SOPORTE: CODIGO.ALFA2.3@GMAIL.COM</a>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
