<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÓDIGO ALFA VIP | Acceso al 1%</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#000;
    color:#eaeaea;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    overflow-x:hidden;
}

/* Glow ambiente */
body::before{
    content:"";
    position:fixed;
    width:700px;
    height:700px;
    background:radial-gradient(circle, rgba(212,175,55,0.18), transparent 70%);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    filter:blur(120px);
    z-index:0;
}

/* ================= TOP ================= */
.topbar{
    font-size:0.7rem;
    letter-spacing:2px;
    margin-bottom:20px;
    color:#666;
    z-index:1;
}

/* ================= HERO ================= */
.hero{
    text-align:center;
    z-index:1;
}

/* ================= ORO REAL ================= */
.gold{
    background:linear-gradient(135deg,#bf953f 0%,#fcf6ba 25%,#b38728 50%,#fbf5e6 75%,#aa771c 100%);
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 8px rgba(212,175,55,0.4));
    animation:goldMove 6s linear infinite;
}

/* Animación */
@keyframes goldMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= TITULO ================= */
h1{
    font-family:'Cinzel',serif;
    font-size:3rem;
    letter-spacing:2px;
}

/* Sub */
.sub{
    margin-top:10px;
    color:#888;
    font-style:italic;
    font-size:0.95rem;
}

/* ================= EBOOK ================= */
.ebook{
    width:180px;
    height:260px;
    margin:30px auto;
    border-radius:10px;
    background:#0a0a0a;
    border:2px solid transparent;
    border-image:linear-gradient(135deg,#bf953f,#fcf6ba,#b38728,#fbf5e6,#aa771c) 1;
    box-shadow:0 0 20px rgba(212,175,55,0.25);
}

/* ================= VAULT ================= */
.vault{
    width:100%;
    max-width:380px;
    background:rgba(10,10,10,0.85);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:14px;
    margin-top:20px;
}

/* Inputs */
input{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid rgba(212,175,55,0.5);
    padding:12px 5px;
    margin-bottom:20px;
    color:#fff;
}

input::placeholder{color:#777;}

input:focus{
    outline:none;
    border-bottom:1px solid #ffd700;
}

/* ================= BOTON ================= */
button{
    width:100%;
    padding:14px;
    font-weight:700;
    border:none;
    border-radius:30px;
    cursor:pointer;
    color:#000;
    background:linear-gradient(135deg,#bf953f 0%,#fcf6ba 25%,#b38728 50%,#fbf5e6 75%,#aa771c 100%);
    background-size:300% 300%;
    animation:goldMove 4s linear infinite;
    box-shadow:0 0 15px rgba(212,175,55,0.5);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px rgba(212,175,55,0.9);
}

/* ================= PROOF ================= */
.proof{
    margin-top:20px;
    font-size:0.75rem;
    color:#666;
    text-align:center;
}

/* ================= RESPONSIVE ================= */
@media(min-width:768px){
    h1{font-size:4.5rem;}
    .ebook{width:220px;height:320px;}
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">ACCESO EXCLUSIVO AL 1%</div>

<!-- HERO -->
<section class="hero">

    <h1 class="gold">CÓDIGO ALFA VIP</h1>
    <p class="sub">El Manifiesto del 1%</p>

    <div class="ebook"></div>

</section>

<!-- FORM -->
<div class="vault">
    <form>
        <input type="text" placeholder="NOMBRE" required>
        <input type="email" placeholder="EMAIL PRIVADO" required>
        <button type="submit">DESCARGAR GUÍA AHORA</button>
    </form>
</div>

<!-- SOCIAL PROOF -->
<div class="proof">
    +4,500 hombres ya accedieron al sistema
</div>

</body>
</html>
