<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CÓDIGO ALFA VIP | El Manifiesto del 1%</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro-gradiente: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 25%, #fcf6ba 50%, #bf953f 75%, #aa771c 100%);
            --oro-real: #bf953f;
            --negro-absoluto: #000000;
            --gris-premium: #0a0a0a;
            --blanco-nitido: #ffffff;
            --texto-claro: #f0f0f0;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--negro-absoluto); color: var(--texto-claro); margin: 0; -webkit-font-smoothing: antialiased; }
        .hero { padding: 150px 20px; text-align: center; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://images.unsplash.com/photo-1554469384-e58fac16e23a?q=80&w=1974&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; border-bottom: 3px solid transparent; border-image: var(--oro-gradiente) 1; }
        .titulo-alfa { font-size: clamp(3rem, 10vw, 6rem); font-family: 'Oswald', sans-serif; background: var(--oro-gradiente); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 4px 2px rgba(0, 0, 0, 0.8)); margin: 0; }
        .optin-container { max-width: 500px; margin: 30px auto 0; background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid rgba(191, 149, 63, 0.3); border-radius: 4px; backdrop-filter: blur(10px); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: white; font-size: 1rem; box-sizing: border-box; }
        .cta-btn { display: inline-block; width: 100%; background: var(--oro-gradiente); color: #000; padding: 20px; font-weight: 700; font-family: 'Oswald', sans-serif; font-size: 1.2rem; border: none; cursor: pointer; text-transform: uppercase; transition: 0.4s; }
        .cta-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .cta-btn:disabled { opacity: 0.5; cursor: wait; }
        .trust-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 25px 20px; background: var(--gris-premium); border-bottom: 1px solid #1a1a1a; font-family: 'Oswald', sans-serif; font-size: 0.9rem; text-transform: uppercase; }
        .trust-icon { color: var(--oro-real); }
        footer { padding: 50px 20px; text-align: center; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="hero">
        <h1 class="titulo-alfa">CÓDIGO ALFA VIP</h1>
        <p style="text-transform: uppercase; letter-spacing: 2px;">El Manifiesto del 1%: <span style="color:var(--oro-real)">No compitas, lidera</span></p>
        
        <div class="optin-container">
            <p style="margin-bottom: 20px; font-weight: 700;">DESCARGA EL MANIFIESTO GRATIS</p>
            
            <form id="form-alfa">
                <input type="text" name="name" placeholder="Tu Nombre Completo" required>
                <input type="email" name="email" placeholder="Tu Email Privado" required>
                <button type="submit" id="btn-submit" class="cta-btn">Acceder al Manifiesto</button>
            </form>
            <p id="mensaje-error" style="display:none; color: red; margin-top: 10px; font-size: 0.8rem;">Algo falló. Revisa tu conexión.</p>
        </div>
    </header>

    <section class="trust-bar">
        <div><span class="trust-icon">⚡</span> Acceso Instantáneo</div>
        <div><span class="trust-icon">🔒</span> Pago Seguro</div>
        <div><span class="trust-icon">🔥</span> +5,000 Miembros</div>
    </section>

    <footer>
        <p>&copy; 2026 CÓDIGO ALFA VIP - Albert S.</p>
    </footer>

    <script>
        const form = document.getElementById("form-alfa");
        const btn = document.getElementById("btn-submit");
        const errorMsg = document.getElementById("mensaje-error");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            // UI de carga
            btn.disabled = true;
            btn.innerHTML = "PROCESANDO ACCESO...";
            errorMsg.style.display = "none";

            const data = new FormData(form);

            try {
                const response = await fetch("https://formspree.io/f/mbdpqqpv", {
                    method: "POST",
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    // SI EL ENVÍO ES EXITOSO, REDIRIGIR INMEDIATAMENTE
                    // CAMBIA ESTE LINK POR TU PDF O TU LINK DE HOTMART
                    window.location.href = "TU_LINK_FINAL_AQUI"; 
                } else {
                    throw new Error();
                }
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = "ACCEDER AL MANIFIESTO";
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
