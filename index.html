<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CÓDIGO ALFA VIP | El Manifiesto del 1%</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro-gradiente: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 25%, #fcf6ba 50%, #bf953f 75%, #aa771c 100%);
            --negro: #000000;
            --oro: #bf953f;
        }
        body { font-family: 'Roboto', sans-serif; background-color: var(--negro); color: #f0f0f0; margin: 0; text-align: center; }
        .hero { padding: 100px 20px; border-bottom: 3px solid transparent; border-image: var(--oro-gradiente) 1; }
        .titulo-alfa { font-family: 'Oswald', sans-serif; font-size: 3.5rem; background: var(--oro-gradiente); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .optin-container { max-width: 450px; margin: 40px auto; background: #0a0a0a; padding: 30px; border: 1px solid rgba(191, 149, 63, 0.3); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: white; box-sizing: border-box; }
        .cta-btn { width: 100%; background: var(--oro-gradiente); color: #000; padding: 20px; font-weight: 700; font-family: 'Oswald', sans-serif; border: none; cursor: pointer; text-transform: uppercase; }
        .cta-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <header class="hero">
        <h1 class="titulo-alfa">CÓDIGO ALFA VIP</h1>
        <div class="optin-container">
            <p style="margin-bottom: 20px; font-weight: 700;">ACCESO EXCLUSIVO 2026</p>
            
            <form id="form-alfa">
                <input type="text" name="name" placeholder="Tu Nombre" required>
                <input type="email" name="email" placeholder="Tu Email Privado" required>
                <button type="submit" id="btn-submit" class="cta-btn">Acceder al Manifiesto</button>
            </form>
            <p id="status-msg" style="margin-top:15px; display:none;"></p>
        </div>
    </header>

    <script>
        const form = document.getElementById("form-alfa");
        const btn = document.getElementById("btn-submit");

        form.addEventListener("submit", async function(e) {
            e.preventDefault(); // ESTO EVITA QUE SALGA LA PANTALLA GRIS
            
            btn.innerHTML = "VALIDANDO...";
            btn.disabled = true;

            const data = new FormData(form);

            // ENVIAMOS POR FETCH (MODO SILENCIOSO)
            fetch("https://formspree.io/f/mbdpqqpv", {
                method: "POST",
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    // SI TODO SALE BIEN, MANDAMOS AL USUARIO A TU LINK
                    // ¡REEMPLAZA ESTE LINK POR EL TUYO!
                    window.location.href = "https://TU_LINK_DE_HOTMART_O_PDF.com";
                } else {
                    alert("Error en el envío. Intenta de nuevo.");
                    btn.disabled = false;
                    btn.innerHTML = "Acceder al Manifiesto";
                }
            }).catch(error => {
                alert("Error de conexión.");
                btn.disabled = false;
                btn.innerHTML = "Acceder al Manifiesto";
            });
        });
    </script>
</body>
</html>
