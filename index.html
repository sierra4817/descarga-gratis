<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÓDIGO ALFA VIP</title>

<style>
/* ========= RESET ========= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========= BASE ========= */
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
  overflow-x: hidden;
}

/* Fondo glow sutil */
body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(212,175,55,0.12), transparent 70%);
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(80px);
  z-index: 0;
}

/* ========= HEADER ========= */
header {
  font-size: 0.75rem;
  color: #444;
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 2rem;
  z-index: 1;
}

/* ========= HERO ========= */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  z-index: 1;
}

/* Título oro 24K */
h1 {
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5e6, #aa771c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 5px rgba(212,175,55,0.5));
  letter-spacing: 2px;
}

/* Subtítulo */
.subtitle {
  margin-top: 1rem;
  font-size: 0.95rem;
  color: #aaa;
  max-width: 400px;
}

/* Ebook */
.ebook {
  margin-top: 2rem;
  width: 160px;
  height: 240px;
  border: 1px solid #AD935B;
  border-radius: 8px;
  background: linear-gradient(145deg, #0a0a0a, #111);
  box-shadow: 0 0 20px rgba(212,175,55,0.1);
}

/* ========= VAULT ========= */
.vault {
  margin-top: 2.5rem;
  width: 100%;
  max-width: 400px;
  padding: 2rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,175,55,0.4);
  border-radius: 16px;
  backdrop-filter: blur(12px);
  position: relative;
  z-index: 1;
}

/* Glow detrás */
.vault::before {
  content: "";
  position: absolute;
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(212,175,55,0.2), transparent 70%);
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(60px);
  z-index: -1;
}

/* Formulario */
form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(212,175,55,0.5);
  padding: 0.7rem 0;
  color: #fff;
  font-size: 0.9rem;
}

input::placeholder {
  color: #666;
}

input:focus {
  outline: none;
  border-bottom: 1px solid #D4AF37;
}

/* Botón */
button {
  margin-top: 1rem;
  padding: 0.9rem;
  background: #D4AF37;
  border: none;
  color: #000;
  font-weight: 800;
  letter-spacing: 1px;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background: #f5d777;
  box-shadow: 0 0 25px rgba(212,175,55,0.9);
}

/* ========= SOCIAL PROOF ========= */
.social-proof {
  margin-top: 1.5rem;
  font-size: 0.8rem;
  color: #777;
  text-align: center;
  z-index: 1;
}

/* ========= RESPONSIVE ========= */
@media(min-width: 768px) {
  h1 {
    font-size: 4rem;
  }

  .subtitle {
    font-size: 1.1rem;
  }

  .ebook {
    width: 200px;
    height: 300px;
  }
}
</style>
</head>

<body>

<header>EL 1% NO COMPITE, DOMINA</header>

<section class="hero">
  <h1>CÓDIGO ALFA VIP</h1>
  <div class="ebook"></div>
  <p class="subtitle">
    El Manifiesto del 1%: Deja de competir y empieza a liderar.
  </p>
</section>

<section class="vault">
  <form>
    <input type="text" placeholder="NOMBRE" required>
    <input type="email" placeholder="EMAIL PRIVADO" required>
    <button type="submit">RECLAMAR ACCESO VIP</button>
  </form>
</section>

<div class="social-proof">
  Únete a los +4,500 hombres que ya dominan su psicología.
</div>

</body>
</html>
