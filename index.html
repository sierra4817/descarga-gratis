<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÓDIGO ALFA VIP | Acceso Privado</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#000;
    color:#e6e6e6;
    display:flex;
    justify-content:center;
    padding:20px;
}

/* ================= WRAPPER ================= */
.container{
    width:100%;
    max-width:480px;
}

/* ================= TOP BAR ================= */
.topbar{
    text-align:center;
    font-size:0.75rem;
    letter-spacing:2px;
    color:#555;
    margin-bottom:40px;
}

/* ================= TITLE ================= */
h1{
    font-family:'Playfair Display',serif;
    font-size:2.6rem;
    text-align:center;
    margin-bottom:10px;
    letter-spacing:1px;

    background:linear-gradient(135deg,#bf953f 0%,#fcf6ba 25%,#b38728 50%,#fbf5e6 75%,#aa771c 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= SUBTITLE ================= */
.subtitle{
    text-align:center;
    color:#888;
    font-size:0.95rem;
    margin-bottom:30px;
}

/* ================= EBOOK ================= */
.ebook{
    width:160px;
    height:240px;
    margin:0 auto 40px;
    border-radius:8px;
    background:#0a0a0a;
    border:1px solid #2a2a2a;
    box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

/* ================= VAULT ================= */
.vault{
    background:#0a0a0a;
    padding:30px;
    border-radius:12px;
    border:1px solid rgba(191,149,63,0.25);
}

/* ================= INPUTS ================= */
input{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid #333;
    padding:12px 5px;
    margin-bottom:20px;
    color:#fff;
    font-size:0.9rem;
}

input::placeholder{
    color:#666;
}

input:focus{
    outline:none;
    border-bottom:1px solid #bf953f;
}

/* ================= BUTTON ================= */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;

    background:linear-gradient(135deg,#bf953f,#fcf6ba,#b38728);
    color:#000;

    transition:all 0.25s ease;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(191,149,63,0.35);
}

/* ================= PROOF ================= */
.proof{
    text-align:center;
    font-size:0.75rem;
    color:#666;
    margin-top:15px;
}

/* ================= FOOTER ================= */
.footer{
    text-align:center;
    font-size:0.7rem;
    color:#444;
    margin-top:30px;
}

/* ================= RESPONSIVE ================= */
@media(min-width:768px){
    h1{font-size:3.5rem;}
    .ebook{width:200px;height:300px;}
}

</style>
</head>

<body>

<div class="container">

    <div class="topbar">ACCESO PRIVADO</div>

    <h1>CÓDIGO ALFA VIP</h1>
    <p class="subtitle">El Manifiesto del 1%</p>

    <div class="ebook"></div>

    <div class="vault">
        <form>
            <input type="text" placeholder="Nombre" required>
            <input type="email" placeholder="Email privado" required>
            <button type="submit">DESCARGAR GUÍA</button>
        </form>
        <div class="proof">Acceso inmediato · Sin spam</div>
    </div>

    <div class="footer">
        © 2026 Código Alfa VIP
    </div>

</div>

</body>
</html>
