<style>

/* =========================
   ORO NIVEL DIOS (REALISTA)
========================= */
@keyframes oroFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 120% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes oroShine {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.oro {
  background:
    linear-gradient(120deg,
      #bf953f 0%,
      #fcf6ba 20%,
      #b38728 40%,
      #fbf5e6 60%,
      #aa771c 80%
    );
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: oroFlow 4s ease-in-out infinite;
  filter: drop-shadow(0 0 12px rgba(212,175,55,0.55));
  position: relative;
}

/* Brillo que cruza el texto */
.oro::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 200%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,0.4) 50%,
    transparent 60%
  );
  animation: oroShine 3.5s linear infinite;
  pointer-events: none;
}

/* =========================
   GLOW AMBIENTAL GLOBAL
========================= */
body::before {
  content: "";
  position: fixed;
  top: -20%;
  left: -20%;
  width: 140%;
  height: 140%;
  background: radial-gradient(circle at 50% 30%, rgba(212,175,55,0.08), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* =========================
   BOTÓN QUE VENDE
========================= */
@keyframes pulseGold {
  0% { box-shadow: 0 0 20px rgba(212,175,55,0.25); }
  50% { box-shadow: 0 0 45px rgba(212,175,55,0.6); }
  100% { box-shadow: 0 0 20px rgba(212,175,55,0.25); }
}

.cta-btn,
.vault-form button {
  animation: oroFlow 4s ease-in-out infinite, pulseGold 2.5s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}

.cta-btn::after,
.vault-form button::after {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 120%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.5),
    transparent
  );
  transition: 0.5s;
}

.cta-btn:hover::after,
.vault-form button:hover::after {
  left: 120%;
}

/* =========================
   MOCKUP 3D PREMIUM
========================= */
@keyframes floatBook {
  0% { transform: translateY(0px) rotateY(-6deg); }
  50% { transform: translateY(-10px) rotateY(6deg); }
  100% { transform: translateY(0px) rotateY(-6deg); }
}

.book-mockup {
  transform-style: preserve-3d;
  animation: floatBook 6s ease-in-out infinite;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.8),
    0 0 40px rgba(212,175,55,0.25);
}

/* =========================
   INPUTS PREMIUM UX
========================= */
.vault-form input:focus {
  border-bottom-color: #fcf6ba;
  box-shadow: 0 10px 20px rgba(212,175,55,0.15);
}

/* =========================
   HOVER CARDS MÁS PRO
========================= */
.chapter-card:hover {
  background: #0c0b00;
  box-shadow: 0 0 25px rgba(212,175,55,0.08);
  transform: translateY(-4px);
}

/* =========================
   MICRO DETALLE LUJO
========================= */
.section-title {
  position: relative;
}

.section-title::after {
  content: "";
  display: block;
  margin: 12px auto 0;
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #bf953f, transparent);
}

/* =========================
   SCROLL SUAVE
========================= */
html {
  scroll-behavior: smooth;
}

</style>
